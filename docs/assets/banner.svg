<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-labelledby="title desc">
  <title id="title">HRMS — Human Resource Management System</title>
  <desc id="desc">Every workday, perfectly aligned. Odoo Hackathon submission banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1420"/>
      <stop offset="100%" stop-color="#122032"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#2FA98A" opacity="0.16"/>
    </pattern>
    <linearGradient id="accentFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2FA98A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2FA98A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#dots)"/>

  <!-- eyebrow -->
  <text x="64" y="56" font-family="Segoe UI, ui-sans-serif, sans-serif" font-size="15" letter-spacing="3.5" fill="#2FA98A" font-weight="600">ODOO HACKATHON&#160;&#160;&#183;&#160;&#160;HUMAN RESOURCE MANAGEMENT SYSTEM</text>
  <rect x="64" y="70" width="360" height="2" fill="url(#accentFade)"/>

  <!-- title -->
  <text x="60" y="150" font-family="Segoe UI, ui-sans-serif, sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#F3F6F5">HRMS</text>

  <!-- tagline -->
  <text x="66" y="192" font-family="Segoe UI, ui-sans-serif, sans-serif" font-size="21" fill="#9FB2AC" font-style="italic">Every workday, perfectly aligned.</text>

  <!-- decorative calendar/check glyph, top right -->
  <g transform="translate(1030,60)">
    <rect x="0" y="10" width="110" height="90" rx="14" fill="none" stroke="#2FA98A" stroke-width="2.5" opacity="0.85"/>
    <line x1="0" y1="36" x2="110" y2="36" stroke="#2FA98A" stroke-width="2.5" opacity="0.85"/>
    <line x1="26" y1="0" x2="26" y2="20" stroke="#2FA98A" stroke-width="2.5" opacity="0.85"/>
    <line x1="84" y1="0" x2="84" y2="20" stroke="#2FA98A" stroke-width="2.5" opacity="0.85"/>
    <path d="M32 68 L50 86 L86 50" fill="none" stroke="#F3F6F5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
